services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tech-news-agent-backend-dev
    restart: unless-stopped
    env_file: .env
    ports:
      - '8000:8000'
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
    environment:
      - TZ=Asia/Taipei
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - tech-news-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: tech-news-agent-frontend-dev
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - tech-news-network

networks:
  tech-news-network:
    driver: bridge
