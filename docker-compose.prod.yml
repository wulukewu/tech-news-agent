services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tech-news-agent-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - '8000:8000'
    volumes:
      - ./backend/logs:/app/logs
    environment:
      - TZ=Asia/Taipei
      - PYTHONUNBUFFERED=1
    networks:
      - tech-news-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tech-news-agent-frontend
    restart: unless-stopped
    env_file: ../.env
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - tech-news-network

networks:
  tech-news-network:
    driver: bridge
