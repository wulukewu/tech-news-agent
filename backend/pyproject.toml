[tool.black]
line-length = 100
target-version = ['py311']

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
]
ignore = [
    "E402",    # module level import not at top (allow in tests and scripts)
    "E501",    # line too long (handled by black)
    "E712",    # comparison to True/False (allow in tests)
    "E721",    # type comparison (allow type() == type() in tests)
    "E722",    # bare except (allow in cleanup code)
    "F821",    # undefined name (false positives with string type annotations)
    "F841",    # unused variable (common in tests and fixtures)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.pylint]
max-args = 6
max-branches = 12
max-returns = 6
max-statements = 50

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
