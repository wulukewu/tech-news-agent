# Netlify Configuration for Next.js Frontend
[build]
  base = "frontend/"
  command = "npm run build"
  publish = ".next"

# Essential Next.js Plugin
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# Production environment variables
[context.production.environment]
  NEXT_PUBLIC_APP_NAME = "Tech News Agent"

# Deploy preview environment
[context.deploy-preview.environment]
  NEXT_PUBLIC_APP_NAME = "Tech News Agent (Preview)"

# API proxy to avoid CORS issues (update with your backend URL)
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend.onrender.com/api/:splat"
#   status = 200
#   force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
