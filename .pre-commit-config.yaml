repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-json

  # Backend: Python formatting with Black
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        files: ^backend/
        language_version: python3.11

  # Backend: Python linting with Ruff (includes complexity checks)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix, --exit-zero]

  # Frontend: Formatting with Prettier
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: bash -c 'npx --prefix frontend prettier --write "$@"' --
        language: system
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, json, css, markdown]

  # Frontend: Linting with ESLint
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'npx --prefix frontend eslint --fix --max-warnings=100 "$@"' --
        language: system
        files: ^frontend/.*\.[jt]sx?$
        types: [file]

  # Frontend: Translation validation
  - repo: local
    hooks:
      - id: validate-translations
        name: Validate translations completeness
        entry: bash -c 'cd frontend && npm run find:missing-translations'
        language: system
        files: ^frontend/locales/.*\.json$
        pass_filenames: false
