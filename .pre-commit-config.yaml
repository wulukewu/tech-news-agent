repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-json

  # Backend: Python formatting with Black
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        files: ^backend/
        language_version: python3.11

  # Backend: Python linting with Ruff (includes complexity checks)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix, --exit-zero]
        # Ruff includes complexity checks via pylint rules (PLR)
        # Configured in backend/pyproject.toml

  # Backend: Python type checking with mypy (temporarily disabled due to type migration)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       files: ^backend/app/
  #       exclude: ^backend/(tests|app/bot)/
  #       args:
  #         [
  #           --ignore-missing-imports,
  #           --no-strict-optional,
  #           --python-version=3.11,
  #           --explicit-package-bases,
  #         ]
  #       additional_dependencies:
  #         - pydantic>=2.7.4
  #         - fastapi>=0.111.0
  #         - types-requests
  #       language_version: python3.11

  # Frontend: Formatting with Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, json, css, markdown]

  # Frontend: Linting with ESLint (includes complexity checks)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: ^frontend/.*\.[jt]sx?$
        types: [file]
        args: [--fix, --max-warnings=100]
        additional_dependencies:
          - eslint@8.56.0
          - eslint-config-next@14.2.0
          - eslint-config-prettier@9.1.0
          - '@typescript-eslint/eslint-plugin@6.21.0'
          - '@typescript-eslint/parser@6.21.0'
          - typescript@5.3.3

  # Frontend: Type checking with TypeScript (disabled for now due to type migration)
  # - repo: local
  #   hooks:
  #     - id: tsc
  #       name: TypeScript type check
  #       entry: bash -c 'cd frontend && npm run type-check'
  #       language: system
  #       files: ^frontend/.*\.tsx?$
  #       pass_filenames: false

  # Frontend: Translation validation
  - repo: local
    hooks:
      - id: validate-translations
        name: Validate translations completeness
        entry: bash -c 'cd frontend && npm run find:missing-translations'
        language: system
        files: ^frontend/locales/.*\.json$
        pass_filenames: false
