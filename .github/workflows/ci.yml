name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    env:
      # Dummy values so Pydantic Settings can initialise during tests.
      # Real secrets are never needed because all external calls are mocked.
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_KEY: dummy_supabase_key
      DISCORD_TOKEN: dummy_discord_token
      DISCORD_CHANNEL_ID: '123456789012345678'
      GROQ_API_KEY: dummy_groq_api_key
      TIMEZONE: Asia/Taipei

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Cache Hypothesis database
        uses: actions/cache@v4
        with:
          path: backend/.hypothesis
          key: hypothesis-${{ runner.os }}-${{ hashFiles('backend/tests/**/*.py') }}
          restore-keys: |
            hypothesis-${{ runner.os }}-

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run fast tests (all branches)
        working-directory: backend
        env:
          HYPOTHESIS_PROFILE: ci
        run: |
          # Run only unit tests that don't require real Supabase
          # These tests use mocks and dummy credentials
          pytest --tb=short -q -n 2 --timeout=300 \
            tests/test_admin_commands.py \
            tests/test_analytics_service.py \
            tests/test_article_page_result.py \
            tests/test_auth_discord_login_endpoint.py \
            tests/test_auth_get_current_user.py \
            tests/test_auth_jwt_utils.py \
            tests/test_build_week_string.py \
            tests/test_config.py \
            tests/test_decorators.py \
            tests/test_health_endpoint.py

      - name: Run full tests (main/PR only)
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        working-directory: backend
        env:
          HYPOTHESIS_PROFILE: ci
        run: |
          # Run all unit tests including property-based tests
          pytest --tb=short -q -n 2 --timeout=600 \
            tests/test_admin_commands.py \
            tests/test_analytics_service.py \
            tests/test_article_page_result.py \
            tests/test_auth_cookie_security_property.py \
            tests/test_auth_discord_login_endpoint.py \
            tests/test_auth_get_current_user.py \
            tests/test_auth_jwt_round_trip_property.py \
            tests/test_auth_jwt_token_structure_property.py \
            tests/test_auth_jwt_utils.py \
            tests/test_auth_oauth2_url_construction_property.py \
            tests/test_build_week_string.py \
            tests/test_config.py \
            tests/test_context_manager_property.py \
            tests/test_cors_headers_property.py \
            tests/test_decorators.py \
            tests/test_health_endpoint.py \
            tests/test_input_validation_property.py \
            tests/test_security_headers_property.py

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run type check
        working-directory: frontend
        run: npm run type-check

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Run unit tests
        working-directory: frontend
        run: npm test -- --passWithNoTests

      - name: Build
        working-directory: frontend
        run: npm run build
