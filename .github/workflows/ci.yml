name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    env:
      # Dummy values so Pydantic Settings can initialise during tests.
      # Real secrets are never needed because all external calls are mocked.
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_KEY: dummy_supabase_key
      DISCORD_TOKEN: dummy_discord_token
      DISCORD_CHANNEL_ID: '123456789012345678'
      GROQ_API_KEY: dummy_groq_api_key
      TIMEZONE: Asia/Taipei

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Cache Hypothesis database
        uses: actions/cache@v4
        with:
          path: backend/.hypothesis
          key: hypothesis-${{ runner.os }}-${{ hashFiles('backend/tests/**/*.py') }}
          restore-keys: |
            hypothesis-${{ runner.os }}-

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run fast tests (all branches)
        working-directory: backend
        env:
          HYPOTHESIS_PROFILE: ci
        run: pytest --tb=short -q -n auto --timeout=300 --ignore-glob="*property*.py" --ignore=tests/integration/

      - name: Run full tests (main/PR only)
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        working-directory: backend
        env:
          HYPOTHESIS_PROFILE: ci
        run: pytest --tb=short -q -n auto --timeout=600

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run type check
        working-directory: frontend
        run: npm run type-check

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Run unit tests
        working-directory: frontend
        run: npm test -- --passWithNoTests

      - name: Build
        working-directory: frontend
        run: npm run build
