name: CI

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']

# Cancel in-progress runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  BACKEND_COVERAGE_THRESHOLD: 30 # TODO: Gradually increase to 70%
  FRONTEND_COVERAGE_THRESHOLD: 70

jobs:
  # ============================================
  # Backend Quality & Tests
  # ============================================
  backend:
    name: Backend
    runs-on: ubuntu-latest

    # Dummy env vars for tests (all external calls are mocked)
    env:
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_KEY: dummy_supabase_key
      DISCORD_TOKEN: dummy_discord_token
      DISCORD_CHANNEL_ID: '123456789012345678'
      GROQ_API_KEY: dummy_groq_api_key
      TIMEZONE: Asia/Taipei
      JWT_SECRET_KEY: dummy_jwt_secret_key_for_testing_only_32_chars
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Code quality checks
        working-directory: backend
        run: |
          echo "🎨 Checking code formatting with Black..."
          black --check app/ tests/

          echo "🔍 Running Ruff linting..."
          ruff check app/ tests/

          # Type checking with mypy is temporarily disabled due to 545 type errors
          # Re-enable after fixing type annotations across the codebase
          # echo "🏗️ Running type checking with mypy..."
          # mypy app/ --ignore-missing-imports --no-strict-optional --python-version=3.11 --explicit-package-bases --exclude='app/bot/'

      - name: Run tests with coverage
        working-directory: backend
        run: |
          echo "🧪 Running tests..."
          pytest -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-report=html:htmlcov \
            -n auto

      - name: Check coverage threshold
        working-directory: backend
        run: |
          python3 -c "
          import json, sys
          with open('coverage.json') as f:
              coverage = json.load(f)['totals']['percent_covered']
          threshold = ${{ env.BACKEND_COVERAGE_THRESHOLD }}
          print(f'📊 Coverage: {coverage:.2f}% (threshold: {threshold}%)')
          sys.exit(0 if coverage >= threshold else 1)
          "

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.json
            backend/htmlcov/
          retention-days: 7

  # ============================================
  # Frontend Quality & Tests
  # ============================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Code quality checks
        working-directory: frontend
        run: |
          echo "🎨 Checking code formatting with Prettier..."
          npm run format:check

          echo "🔍 Running ESLint..."
          npm run lint

          echo "🏗️ Running TypeScript type check..."
          npm run type-check

      - name: Run tests with coverage
        working-directory: frontend
        continue-on-error: true # TODO: Fix failing tests and remove this
        run: |
          echo "🧪 Running tests..."
          npm run test:coverage -- --passWithNoTests

      - name: Check coverage threshold
        working-directory: frontend
        run: |
          node -e "
          const fs = require('fs');
          try {
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total.lines.pct;
            const threshold = ${{ env.FRONTEND_COVERAGE_THRESHOLD }};
            console.log(\`📊 Coverage: \${total.toFixed(2)}% (threshold: \${threshold}%)\`);
            process.exit(total >= threshold ? 0 : 1);
          } catch (error) {
            console.log('⚠️ No coverage data found, skipping threshold check');
            process.exit(0);
          }
          "

      - name: Build application
        working-directory: frontend
        run: npm run build

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ============================================
  # Quality Gate
  # ============================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "🚪 Quality Gate - Checking all job results..."

          backend_status="${{ needs.backend.result }}"
          frontend_status="${{ needs.frontend.result }}"

          echo "Backend: $backend_status"
          echo "Frontend: $frontend_status"

          if [[ "$backend_status" != "success" ]] || [[ "$frontend_status" != "success" ]]; then
            echo "❌ Quality gate failed"
            exit 1
          fi

          echo "✅ All quality checks passed!"
          echo "🎉 Ready for merge!"

      - name: Generate summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Quality Gate Results 📊

          | Check | Status |
          |-------|--------|
          | Backend | ${{ needs.backend.result == 'success' && '✅ Passed' || '❌ Failed' }} |
          | Frontend | ${{ needs.frontend.result == 'success' && '✅ Passed' || '❌ Failed' }} |

          ### Quality Checks Include:
          - 🎨 Code formatting (Black, Prettier)
          - 🔍 Linting (Ruff, ESLint)
          - 🏗️ Type checking (mypy, TypeScript)
          - 🧪 Test coverage (≥${{ env.BACKEND_COVERAGE_THRESHOLD }}% backend, ≥${{ env.FRONTEND_COVERAGE_THRESHOLD }}% frontend)
          - ⚡ Build verification
          EOF
