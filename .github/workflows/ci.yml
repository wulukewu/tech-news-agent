name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Dummy values so Pydantic Settings can initialise during tests.
      # Real secrets are never needed because all external calls are mocked.
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_KEY: dummy_supabase_key
      DISCORD_TOKEN: dummy_discord_token
      DISCORD_CHANNEL_ID: '123456789012345678'
      GROQ_API_KEY: dummy_groq_api_key
      TIMEZONE: Asia/Taipei

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q
