name: CI (Optimized)

on:
  push:
  pull_request:

# Cancel in-progress runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  # Ensure consistent environment
  FORCE_COLOR: '1'
  CI: 'true'

jobs:
  # ============================================
  # Backend Quality & Tests
  # ============================================
  backend:
    name: Backend
    runs-on: ubuntu-latest

    env:
      # Dummy env vars for tests (all external calls are mocked)
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_KEY: dummy_supabase_key
      DISCORD_TOKEN: dummy_discord_token
      DISCORD_CHANNEL_ID: '123456789012345678'
      GROQ_API_KEY: dummy_groq_api_key
      TIMEZONE: Asia/Taipei
      JWT_SECRET_KEY: dummy_jwt_secret_key_for_testing_only_32_chars
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install black ruff mypy
          if [ -f requirements-minimal.txt ]; then
            pip install -r requirements-minimal.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt || echo "Some dependencies failed, continuing..."
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt || echo "Some dev dependencies failed, continuing..."
          fi

      - name: Code quality checks
        working-directory: backend
        run: |
          echo "🎨 Checking code formatting with Black..."
          python -m black --check --diff app/ tests/ || {
            echo "❌ Black formatting issues found. Run 'black app/ tests/' to fix."
            exit 1
          }

          echo "🔍 Running Ruff linting..."
          python -m ruff check app/ tests/ || {
            echo "❌ Ruff linting issues found. Run 'ruff check --fix app/ tests/' to fix."
            exit 1
          }

      - name: Run tests with coverage
        working-directory: backend
        run: |
          echo "🧪 Running backend tests with coverage..."
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=term --cov-report=html --cov-fail-under=50 || {
            echo "⚠️ Tests failed or coverage below 50%"
            echo "Run 'pytest tests/ --cov=app --cov-report=html' locally to see coverage report"
            exit 1
          }

  # ============================================
  # Frontend Quality & Tests
  # ============================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm ci --prefer-offline --no-audit
          # Ensure .next directory has correct permissions
          mkdir -p .next/cache
          chmod -R 755 .next || true

      - name: Code quality checks
        working-directory: frontend
        run: |
          echo "🎨 Checking code formatting with Prettier..."
          npm run format:check || {
            echo "❌ Prettier formatting issues found. Run 'npm run format' to fix."
            exit 1
          }

          echo "🔍 Running TypeScript type checking..."
          npm run type-check || {
            echo "❌ TypeScript type errors found. Fix the errors above."
            exit 1
          }

          echo "🔍 Running ESLint (warnings allowed)..."
          npm run lint || {
            echo "⚠️ ESLint warnings found, but continuing..."
            echo "Run 'npm run lint:fix' to fix auto-fixable issues."
          }

      - name: Build verification
        working-directory: frontend
        run: |
          echo "🏗️ Building application..."
          npm run build || {
            echo "❌ Build failed. Check the build logs above."
            exit 1
          }

      - name: Run tests with coverage
        working-directory: frontend
        run: |
          echo "🧪 Running frontend tests with coverage..."
          npm run test:coverage -- --run || {
            echo "⚠️ Tests failed or coverage below threshold"
            echo "Run 'npm run test:coverage' locally to see coverage report"
            exit 1
          }

  # ============================================
  # Quality Gate
  # ============================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "🚪 Quality Gate - Checking all job results..."

          backend_status="${{ needs.backend.result }}"
          frontend_status="${{ needs.frontend.result }}"

          echo "Backend: $backend_status"
          echo "Frontend: $frontend_status"

          if [[ "$backend_status" != "success" ]] || [[ "$frontend_status" != "success" ]]; then
            echo "❌ Quality gate failed"
            exit 1
          fi

          echo "✅ All quality checks passed!"
          echo "🎉 Ready for merge!"

      - name: Generate summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Quality Gate Results 📊

          | Component | Status |
          |-----------|--------|
          | Backend | ${{ needs.backend.result == 'success' && '✅ Passed' || '❌ Failed' }} |
          | Frontend | ${{ needs.frontend.result == 'success' && '✅ Passed' || '❌ Failed' }} |

          ### What's Checked (Blocking):
          - 🎨 Code formatting (Black, Prettier)
          - 🔍 Linting (Ruff, ESLint)
          - 🔍 Type checking (TypeScript)
          - 🏗️ Build verification (Frontend)

          ### What's Checked (Non-blocking):
          - 🧪 Tests (informational only)

          ### Temporarily Disabled:
          - Type checking (fixing i18n issues)
          - Test coverage requirements
          - Strict test passing
          EOF
