name: CI (Optimized)

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Essential Checks Only
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend Quality Checks
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install black ruff

      - name: Backend code quality
        working-directory: backend
        run: |
          echo "🎨 Checking Python code formatting..."
          black --check app/ tests/

          echo "🔍 Running Python linting..."
          ruff check app/ tests/

      # Frontend Quality Checks
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend code quality
        working-directory: frontend
        run: |
          echo "🎨 Checking frontend code formatting..."
          npm run format:check || echo "⚠️ Format issues found but not blocking"

          echo "🔍 Running frontend linting..."
          npm run lint || echo "⚠️ Lint warnings found but not blocking"

      - name: Build verification
        working-directory: frontend
        run: |
          echo "🏗️ Verifying build..."
          npm run build

  # ============================================
  # Optional Tests (Non-blocking)
  # ============================================
  tests:
    name: Tests (Optional)
    runs-on: ubuntu-latest
    continue-on-error: true # Tests won't block the pipeline

    env:
      # Dummy env vars for backend tests
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_KEY: dummy_supabase_key
      DISCORD_TOKEN: dummy_discord_token
      DISCORD_CHANNEL_ID: '123456789012345678'
      GROQ_API_KEY: dummy_groq_api_key
      TIMEZONE: Asia/Taipei
      JWT_SECRET_KEY: dummy_jwt_secret_key_for_testing_only_32_chars
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend Tests
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        continue-on-error: true
        run: |
          echo "🧪 Running backend tests..."
          python3 -m pytest tests/ -v --tb=short || echo "⚠️ Some backend tests failed"

      # Frontend Tests
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        continue-on-error: true
        run: |
          echo "🧪 Running frontend tests..."
          npm run test -- --run || echo "⚠️ Some frontend tests failed"

  # ============================================
  # Summary
  # ============================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [code-quality, tests]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## CI Results 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.tests.result == 'success' && '✅ Passed' || '⚠️ Issues (Non-blocking)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What's Checked:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Code formatting** (Black, Prettier)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Linting** (Ruff, ESLint)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Build verification**" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ **Tests** (informational only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What's NOT Checked (for now):" >> $GITHUB_STEP_SUMMARY
          echo "- Type checking (too many i18n issues)" >> $GITHUB_STEP_SUMMARY
          echo "- Test coverage requirements" >> $GITHUB_STEP_SUMMARY
          echo "- Strict test passing" >> $GITHUB_STEP_SUMMARY

      - name: Final status
        run: |
          if [[ "${{ needs.code-quality.result }}" == "success" ]]; then
            echo "✅ Essential checks passed - ready to merge!"
          else
            echo "❌ Essential checks failed - please fix code quality issues"
            exit 1
          fi
